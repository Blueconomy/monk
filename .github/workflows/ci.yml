name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=monk --cov-report=term-missing

      - name: Smoke test CLI
        run: |
          # Exit 1 = findings detected (expected). Exit 0 = no findings. >=2 = crash.
          monk run tests/fixtures/sample_traces.jsonl || exit_code=$?
          if [ "${exit_code:-0}" -gt 1 ]; then exit "${exit_code}"; fi

      - name: Smoke test OTEL format
        run: |
          # Verify --format otel flag parses gracefully on a non-OTEL file (no crash)
          monk run tests/fixtures/sample_traces.jsonl --format otel --min-severity low || true
